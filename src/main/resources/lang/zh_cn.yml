ban:
  usage: "<prefix><#F6D365>用法</#F6D365> <#E0E0E0>| <#A1FFCE>/ban <玩家名|UUID> [原因]</#A1FFCE></#E0E0E0>"
  success: "<prefix><#FF4C4C>永久封禁</#FF4C4C> <#E0E0E0>| 已将 <#FFAAAA><player></#FFAAAA> 永久移出当前规则范围。原因：<#F6D365><reason></#F6D365></#E0E0E0>"
  default-reason: "违反服务器规则"
  kick-message:
    - "<#FF416C><b>你已被本服永久封禁</b></#FF416C>"
    - ""
    - "<#E0E0E0>原因：<#FFFFFF><reason></#FFFFFF></#E0E0E0>"
    - "<#E0E0E0>执行人：<#FFFFFF><operator></#FFFFFF></#E0E0E0>"
    - "<#E0E0E0>时间：<#FFFFFF><time></#FFFFFF></#E0E0E0>"
    - ""
    - "<#A1FFCE>如需申诉，请联系管理员。</#A1FFCE>"

tempban:
