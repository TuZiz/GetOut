    - "<#FF4C4C><b>服务器连接故障</b></#FF4C4C>"
    - "<#E0E0E0>惩戒系统数据库同步失败，为保护核心数据，当前暂时拒绝进入。</#E0E0E0>"
    - "<#E0E0E0>请稍后重试，或联系管理员。</#E0E0E0>"

info:
