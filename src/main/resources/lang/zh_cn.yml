    - "<#E0E0E0>原因：<#FFFFFF><reason></#FFFFFF></#E0E0E0>"
    - "<#E0E0E0>执行人：<#FFFFFF><operator></#FFFFFF></#E0E0E0>"

login:
  banned:
    - "<#FF416C><b>你已被本服永久封禁</b></#FF416C>"
    - ""
    - "<#E0E0E0>原因：<#FFFFFF><reason></#FFFFFF></#E0E0E0>"
    - "<#E0E0E0>执行人：<#FFFFFF><operator></#FFFFFF></#E0E0E0>"
