  target-offline: "<prefix><#FF4C4C>目标离线</#FF4C4C> <#E0E0E0>| 玩家 <#FFAAAA><player></#FFAAAA> 当前不在线。</#E0E0E0>"
  database-error: "<prefix><#FF4C4C>数据库错误</#FF4C4C> <#E0E0E0>| 数据库操作失败，请查看日志。</#E0E0E0>"
