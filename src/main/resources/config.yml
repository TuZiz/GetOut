# Getout 主配置文件。

# 当前服务器唯一标识。
# 启用共享数据库后，每台子服都必须不同。
server-id: "server-1"

# 是否输出调试日志。
debug: false

# 数据库不可用时是否放行登录。
# true = 放行登录。
# false = 拒绝登录。
fail-open-on-database-error: false

# 存储模式配置。
storage:
  # 存储类型。
  # yaml = 本地 YAML 存储。
  # database = 共享数据库存储，支持跨服同步。
  type: yaml
  # 数据库启动失败后的处理策略。
  # fail-fast = 直接停用插件。
  # fallback-yaml = 自动退回本地 YAML。
  database-failure-strategy: fail-fast

# /ban 行为配置。
ban:
  # /ban 是否顺带自动封禁玩家 IP。
  # 默认 false，需要时请显式改成 true。
  auto-ip-ban: false

# 数据库配置。
# 仅在 storage.type = database 时生效。
database:
  # 数据库类型。
  # 支持 mysql / mariadb / postgresql / sqlite。
  type: mysql
  # 数据库主机地址。
  host: localhost
  # 数据库端口。
  port: 3306
  # 数据库名称。
  database: getout
  # 数据库用户名。
  username: root
  # 数据库密码。
  password: password
  # 表名前缀。
  # 只允许字母、数字、下划线，且必须以字母开头。
  table-prefix: "getout_"
  # 连接池配置。
  pool:
    # 最大连接数。
    maximum-pool-size: 10
    # 最小空闲连接数。
    minimum-idle: 2
    # 获取连接超时时间，单位毫秒。
    connection-timeout-ms: 30000
    # 单个连接最大存活时间，单位毫秒。
    max-lifetime-ms: 1800000

# 同步与清理配置。
sync:
  # 事件轮询间隔，单位 tick。
  poll-interval-ticks: 20
  # 同步事件保留天数。
  event-retention-days: 7
  # 封禁后是否立刻踢出当前在线玩家。
  kick-online-after-ban: true
  # 是否处理本服自己写出的同步事件。
  process-own-events: false

# /kick 行为配置。
kick:
  # 是否允许通过玩家索引跨服踢出目标。
  cross-server: true

# 过期数据清理配置。
cleanup:
  # 临时封禁过期清理间隔，单位 tick。
  expired-ban-interval-ticks: 6000

# 管理通知配置。
admin-notify:
  # 是否广播惩戒通知。
  enabled: true
  # 接收通知所需权限。
  permission: getout.notify
  # 是否同时输出到控制台。
  console: true

# 缓存配置。
cache:
  # PlaceholderAPI 缓存秒数。
  papi-cache-seconds: 30
  # 玩家索引缓存秒数。
  player-index-cache-seconds: 300

# 时间显示配置。
time:
  # 时区。
  zone-id: "Asia/Shanghai"
  # 时间格式。
  format: "yyyy-MM-dd HH:mm:ss"

# 语言配置。
messages:
  # 默认语言文件名。
  lang: zh_cn
