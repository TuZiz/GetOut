    - "<#FF8787>玩家 <player> 被永久封禁，编号 #<ban_id></#FF8787>"
  temp-banned:
    - "<#FEE140>玩家 <player> 被临时封禁，编号 #<ban_id></#FEE140>"
  ip-banned:
    - "<#FF8787>玩家 <player> 的 IP 已被封禁，编号 #<ip_ban_id></#FF8787>"
