  default-reason: "IP 被管理员封禁"

tempban:
  usage: "<prefix><#FEE140>命令用法</#FEE140> <#A0AEC0>| <#00E1D9>/tempban <玩家名|UUID> <时长> [封禁原因]</#00E1D9></#A0AEC0>"
