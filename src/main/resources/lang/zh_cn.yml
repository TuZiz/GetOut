  default-reason: "管理员手动解除封禁"

kick:
  usage: "<prefix><#FEE140>命令用法</#FEE140> <#A0AEC0>| <#00E1D9>/kick <玩家名|UUID> [踢出原因]</#00E1D9></#A0AEC0>"
  success: "<prefix><#FF9A44>强制踢出</#FF9A44> <#A0AEC0>| 已将 <#FF7676><player></#FF7676> 踢出服务器。原因：<#FEE140><reason></#FEE140></#A0AEC0>"
  default-reason: "你已被管理员移出服务器"
  message:
    - "<gradient:#FF9A44:#FC6076><b>你已被移出服务器</b></gradient>"
    - ""
    - "<#A0AEC0>踢出原因 <#CBD5E1>▪</#CBD5E1> <#FEE140><reason></#FEE140>"
    - "<#A0AEC0>处理人员 <#CBD5E1>▪</#CBD5E1> <#4FACFE><operator></#4FACFE>"

login:
