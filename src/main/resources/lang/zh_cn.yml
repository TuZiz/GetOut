  polling: "<#84FAB0>同步轮询 <#FFFFFF><interval> ticks</#FFFFFF>"

placeholder:
  yes: "<#43E97B>是</#43E97B>"
  no: "<#FF4C4C>否</#FF4C4C>"
  none: "<#A0A0A0>暂无记录</#A0A0A0>"
  never: "<#FF416C>永久</#FF416C>"
  unknown: "<#F6D365>未知</#F6D365>"
  loading: "<#A1FFCE>加载中...</#A1FFCE>"

