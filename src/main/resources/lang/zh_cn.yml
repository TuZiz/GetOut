ban:
  usage: "<prefix><#FEE140>命令用法</#FEE140> <#A0AEC0>| <#00E1D9>/ban <玩家名|UUID> [封禁原因]</#00E1D9></#A0AEC0>"
  success: "<prefix><#FF0844>永久封禁</#FF0844> <#A0AEC0>| 已永久封禁 <#FF7676><player></#FF7676>。原因：<#FEE140><reason></#FEE140></#A0AEC0>"
  default-reason: "违反服务器规则"
  kick-message:
    - "<#FF8787>玩家 <player> 被永久封禁，编号 #<ban_id></#FF8787>"

banip:
  usage: "<prefix><#FEE140>命令用法</#FEE140> <#A0AEC0>| <#00E1D9>/banip <玩家名|UUID> [封禁原因]</#00E1D9></#A0AEC0>"
