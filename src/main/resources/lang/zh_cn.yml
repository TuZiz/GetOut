  tempban: "<prefix><#F6D365>[<scope>]</#F6D365> <#FFFFFF>TEMPBAN</#FFFFFF> <#E0E0E0>| 玩家 <#FFAAAA><player></#FFAAAA>，原因：<#F6D365><reason></#F6D365>，执行人：<#FFFFFF><operator></#FFFFFF>，来源服：<#FFFFFF><server></#FFFFFF></#E0E0E0>"
  kick: "<prefix><#FF9966>[<scope>]</#FF9966> <#FFFFFF>KICK</#FFFFFF> <#E0E0E0>| 玩家 <#FFAAAA><player></#FFAAAA>，原因：<#F6D365><reason></#F6D365>，执行人：<#FFFFFF><operator></#FFFFFF>，来源服：<#FFFFFF><server></#FFFFFF></#E0E0E0>"
