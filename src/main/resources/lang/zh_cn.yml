  kick-message:
    - "<#F6D365><b>你已被本服临时封禁</b></#F6D365>"
    - ""
    - "<#E0E0E0>原因：<#FFFFFF><reason></#FFFFFF></#E0E0E0>"
    - "<#E0E0E0>剩余时间：<#FFFFFF><left></#FFFFFF></#E0E0E0>"
    - "<#E0E0E0>解封时间：<#FFFFFF><expire></#FFFFFF></#E0E0E0>"
    - "<#E0E0E0>执行人：<#FFFFFF><operator></#FFFFFF></#E0E0E0>"

kick:
