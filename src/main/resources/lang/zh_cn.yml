  kick-message:
    - "<#FEE140>玩家 <player> 被临时封禁，编号 #<ban_id></#FEE140>"

unban:
  usage: "<prefix><#FEE140>命令用法</#FEE140> <#A0AEC0>| <#00E1D9>/unban <玩家名|UUID> [解封原因]</#00E1D9></#A0AEC0>"
